<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maharashtra Industrial Safety Solution</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="header">
    <div class="logo-wrap">
      <img src="Picture1.png" alt="Logo">
    </div>
    <div></div>
  </div>
  <nav>
    <a href="index.html" class="active-page">Home</a>
    <a href="about.html">About Us</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact</a>
    <a href="customers.html">Our Customers</a>
  </nav>
</header>

<div class="home">
  <img src="koIWd.jpg" class="img" alt="Hero" />
  <div class="text">
    <h1>
      <span class="type-wrap">
        <span class="typed" id="typed-word"></span><span class="cursor">|</span>
      </span>
    </h1>
    <h3>Trusted industrial safety equipment manufacturer and supplier across all over the World.</h3>
    <a href="products.html" class="btn">View Products</a>
  </div>
</div>

<main>

  <div class="photos-section">
    <div class="photos-grid">
      <img src="P10.webp" alt="Safety Photo 1" />
      <img src="P3.jpg"   alt="Safety Photo 2" />
      <img src="p11.jpg"   alt="Safety Photo 3" />
      <img src="P8.jpg"   alt="Safety Photo 4" />
      <img src="P9.jpg"   alt="Safety Photo 5" />
    </div>
  </div>

  <div class="content-no-pad">
    <div class="tab-btns">
      <button class="tab-btn active" data-tab="enquiry" onclick="openTab('enquiry')">Enquiries</button>
      <button class="tab-btn"        data-tab="trade"   onclick="openTab('trade')">Trade Partners</button>
    </div>

    <div class="tab-pane active" id="enquiry">
      <h3>Send Us an Enquiry</h3>
      <form onsubmit="submitForm(event,'msg1')">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input name="name" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone</label>
            <input name="phone" placeholder="+91 XXXXX XXXXX">
          </div>
          <div class="form-group">
            <label>Address</label>
            <input name="address" placeholder="City, State">
          </div>
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea name="message" placeholder="What are you looking for?"></textarea>
        </div>
        <button type="submit" class="btn">Submit</button>
        <div class="msg" id="msg1"></div>
      </form>
    </div>

    <div class="tab-pane" id="trade">
      <h3>Become a Trade Partner</h3>
      <form onsubmit="submitForm(event,'msg2')">
        <div class="form-row">
          <div class="form-group">
            <label>Contact Person *</label>
            <input name="name" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label>Business Email *</label>
            <input type="email" name="email" placeholder="business@company.com" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone</label>
            <input name="phone" placeholder="+91 XXXXX XXXXX">
          </div>
          <div class="form-group">
            <label>Business Address</label>
            <input name="address" placeholder="City, State">
          </div>
        </div>
        <div class="form-group">
          <label>About Your Business</label>
          <textarea name="message" placeholder="Tell us about your company..."></textarea>
        </div>
        <button type="submit" class="btn">Submit </button>
        <div class="msg" id="msg2"></div>
      </form>
    </div>
  </div>

</main>

<footer>
  <h4>Thank you for visiting</h4>
  <h4>© 2025 Maharashtra Industrial Safety Solution. All rights reserved.</h4>
</footer>

<script src="script.js"></script>
</body>
</html>
